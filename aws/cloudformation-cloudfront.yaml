AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution for the static S3 website origin with custom domain support.

Parameters:
  DomainName:
    Type: String
    Default: magnisapp.com
    Description: Apex custom domain for the distribution.
  WwwDomainName:
    Type: String
    Default: www.magnisapp.com
    Description: WWW custom domain for the distribution.
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 covering DomainName and WwwDomainName.
  OriginDomainName:
    Type: String
    Description: S3 website endpoint domain, for example bucket.s3-website-us-east-1.amazonaws.com.

Resources:
  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${DomainName} static website'
        Aliases:
          - !Ref DomainName
          - !Ref WwwDomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: S3WebsiteOrigin
            DomainName: !Ref OriginDomainName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

Outputs:
  DistributionId:
    Description: CloudFront distribution ID.
    Value: !Ref SiteDistribution
  DistributionDomainName:
    Description: CloudFront domain to use in DNS.
    Value: !GetAtt SiteDistribution.DomainName
  CloudFrontHostedZoneId:
    Description: CloudFront hosted zone ID for Route 53 aliases.
    Value: Z2FDTNDATAQYW2
